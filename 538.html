<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雅思538 智能斩词 (百词斩模式版)</title>
    <meta name="description" content="基于记忆曲线的雅思核心538词汇记忆工具，支持百词斩模式、Class 1-3词库切换及语音朗读，助你高效备考雅思。">
    <meta name="keywords" content="雅思538, 雅思背单词, 智能斩词, 雅思核心词汇, IELTS词汇">
    <meta name="author" content="你的名字或昵称">

    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .perspective-1000 { perspective: 1000px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 荧光条动画 */
        .error-bar { transition: width 0.5s ease-out; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans min-h-screen flex flex-col">

    <!-- 头部 -->
    <header class="bg-white shadow-sm px-4 py-3 sticky top-0 z-30">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-indigo-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                <h1 class="text-lg font-bold text-slate-800">雅思538 智能斩词</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleStats(true)" class="p-2 text-slate-400 hover:text-indigo-600" title="统计详情">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                </button>
                <button onclick="toggleSettings(true)" class="p-2 text-slate-400 hover:text-slate-600" title="设置">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.35a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 分类栏 -->
    <div class="bg-white border-t border-slate-100 px-4 py-3 sticky top-14 z-20 shadow-sm">
        <div id="category-container" class="max-w-md mx-auto flex gap-2 overflow-x-auto pb-1 no-scrollbar">
            <!-- JS 注入按钮 -->
        </div>
    </div>

    <!-- 主内容 -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 w-full max-w-md mx-auto">
        
        <!-- 进度条 -->
        <div class="w-full mb-6">
            <div class="flex justify-between text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wide">
                <span id="current-category-label">全部乱序</span>
                <span id="progress-text">进度 0% (0/0)</span>
            </div>
            <div class="h-2 bg-slate-200 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <!-- 卡片区域 -->
        <div class="w-full relative min-h-[480px] perspective-1000">
            
            <div id="card-view" class="w-full bg-white rounded-3xl shadow-xl overflow-hidden min-h-[480px] flex flex-col border border-slate-100 relative fade-in" style="display: flex;">
                
                <div id="word-badge" class="absolute top-4 right-4 px-3 py-1 rounded-full text-xs font-bold border">
                    Class 1
                </div>

                <!-- 单词显示区 -->
                <div class="flex-1 flex flex-col items-center justify-center p-6 text-center cursor-pointer select-none" onclick="toggleMeaning()">
                    <div class="mb-6 w-full relative">
                        <h2 id="word-text" class="text-4xl font-black text-slate-800 tracking-tight mb-2 break-words z-10 relative">
                            Loading...
                        </h2>
                        <!-- 错误次数提示 -->
                        <div id="error-badge" class="hidden inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800 mb-2">
                            错误: <span id="error-count-display" class="ml-1">0</span>
                        </div>
                        <p class="text-slate-400 text-sm font-semibold tracking-widest uppercase mt-1">IELTS Reading</p>
                    </div>

                    <!-- 释义区 -->
                    <div id="meaning-container" class="w-full transition-all duration-300 opacity-0 translate-y-8 px-2" style="pointer-events: none;">
                        <div class="bg-indigo-50 px-5 py-4 rounded-xl mb-3 border border-indigo-100 shadow-sm">
                            <p id="meaning-text" class="text-lg text-slate-800 font-bold leading-relaxed">
                                ...
                            </p>
                        </div>
                        <div id="synonym-box" class="bg-orange-50 px-5 py-3 rounded-xl border border-orange-100 hidden shadow-sm text-left">
                            <p class="text-xs text-orange-500 font-bold uppercase mb-1 flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                                考点替换 / 关联词
                            </p>
                            <p id="synonym-text" class="text-base text-slate-700 font-medium italic">
                                ...
                            </p>
                        </div>
                    </div>
                    
                    <div id="hint-text" class="absolute bottom-32 text-slate-300 text-sm flex items-center gap-2 animate-bounce">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        点击显示释义 <span id="hint-key" class="hidden md:inline bg-slate-200 px-1 rounded text-xs ml-1">Space</span>
                    </div>
                </div>

                <!-- 底部按钮区 (标准模式: 3个按钮) -->
                <div id="controls-standard" class="bg-slate-50 p-4 border-t border-slate-100 grid grid-cols-3 gap-3">
                    <!-- 不记得 -->
                    <button onclick="handleForgot()" class="bg-white border border-slate-200 hover:bg-red-50 hover:border-red-200 hover:text-red-600 text-slate-700 py-3 rounded-xl font-bold text-sm md:text-base shadow-sm active:scale-95 transition-all flex flex-col items-center justify-center gap-1 group">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 opacity-60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l14.2-17"/><path d="M2 5h1.4c1.3 0 2.5.6 3.3 1.7l14.2 17"/><path d="M15 5h6v6"/><path d="M15 19h6v-6"/></svg>
                        <span>不记得 <span id="key-forgot" class="hidden md:inline font-normal text-xs opacity-50 bg-slate-100 px-1 rounded ml-1">Q</span></span>
                    </button>
                    
                    <!-- 模糊 -->
                    <button onclick="handleFuzzy()" class="bg-amber-100 border border-amber-200 hover:bg-amber-200 text-amber-800 py-3 rounded-xl font-bold text-sm md:text-base shadow-sm active:scale-95 transition-all flex flex-col items-center justify-center gap-1 group">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                        <span>模糊 <span id="key-fuzzy" class="hidden md:inline font-normal text-xs opacity-50 bg-amber-50 px-1 rounded ml-1">W</span></span>
                        <span class="text-[10px] opacity-75 font-normal">15词后重现</span>
                    </button>

                    <!-- 斩 -->
                    <button onclick="handleMaster()" class="bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold text-sm md:text-base shadow-lg shadow-indigo-200 active:scale-95 transition-all flex flex-col items-center justify-center gap-1 group">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        <span>斩 <span id="key-master" class="hidden md:inline font-normal text-xs opacity-50 bg-indigo-500 px-1 rounded ml-1">E</span></span>
                    </button>
                </div>

                <!-- 底部按钮区 (复习模式: 下一个) -->
                <div id="controls-review" class="bg-slate-50 p-4 border-t border-slate-100 hidden">
                    <button onclick="handleNext()" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 group">
                        下一个
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 group-hover:translate-x-1 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                        <span class="hidden md:inline bg-slate-700 px-1.5 py-0.5 rounded text-xs font-normal ml-2">Space</span>
                    </button>
                </div>
            </div>

            <!-- 完成界面 -->
            <div id="done-view" class="w-full bg-white rounded-3xl shadow-xl p-12 text-center flex flex-col items-center min-h-[480px] justify-center hidden">
                <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-green-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">太棒了！</h2>
                <p class="text-slate-600 mb-8">
                    你已经斩完了 <span id="done-category-name" class="text-indigo-600 font-bold">...</span> 的所有单词。
                </p>
                <div class="flex gap-4">
                    <button onclick="resetProgress()" class="px-6 py-3 rounded-full border border-slate-200 text-slate-600 font-bold hover:bg-slate-50">
                        重置当前进度
                    </button>
                    <button onclick="switchCategory('all')" class="px-6 py-3 rounded-full bg-indigo-600 text-white font-bold shadow-lg hover:bg-indigo-700">
                        挑战其他分类
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- 设置弹窗 -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-6 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">设置</h2>
                <button onclick="toggleSettings(false)" class="p-2 hover:bg-slate-100 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            
            <div class="space-y-6">
                <!-- 快捷键设置 -->
                <div>
                    <h3 class="font-semibold mb-3 text-slate-800 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><line x1="6" y1="8" x2="6" y2="8"/><line x1="10" y1="8" x2="10" y2="8"/><line x1="14" y1="8" x2="14" y2="8"/><line x1="18" y1="8" x2="18" y2="8"/><line x1="6" y1="12" x2="6" y2="12"/><line x1="10" y1="12" x2="10" y2="12"/><line x1="14" y1="12" x2="14" y2="12"/><line x1="18" y1="12" x2="18" y2="12"/><line x1="6" y1="16" x2="18" y2="16"/></svg>
                        快捷键 (点击输入框按键修改)
                    </h3>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <label class="block text-slate-500 mb-1">显示释义 / 下一个</label>
                            <input type="text" readonly id="input-key-show" class="w-full p-2 border rounded bg-slate-50 text-center font-mono cursor-pointer hover:bg-white focus:ring-2 focus:ring-indigo-500 outline-none" value="Space" onclick="startListeningKey(this, 'show')">
                        </div>
                        <div>
                            <label class="block text-slate-500 mb-1">不记得</label>
                            <input type="text" readonly id="input-key-forgot" class="w-full p-2 border rounded bg-slate-50 text-center font-mono cursor-pointer hover:bg-white focus:ring-2 focus:ring-indigo-500 outline-none" value="q" onclick="startListeningKey(this, 'forgot')">
                        </div>
                        <div>
                            <label class="block text-slate-500 mb-1">模糊</label>
                            <input type="text" readonly id="input-key-fuzzy" class="w-full p-2 border rounded bg-slate-50 text-center font-mono cursor-pointer hover:bg-white focus:ring-2 focus:ring-indigo-500 outline-none" value="w" onclick="startListeningKey(this, 'fuzzy')">
                        </div>
                        <div>
                            <label class="block text-slate-500 mb-1">斩 (已会)</label>
                            <input type="text" readonly id="input-key-master" class="w-full p-2 border rounded bg-slate-50 text-center font-mono cursor-pointer hover:bg-white focus:ring-2 focus:ring-indigo-500 outline-none" value="e" onclick="startListeningKey(this, 'master')">
                        </div>
                    </div>
                    <button onclick="resetShortcuts()" class="text-xs text-indigo-600 hover:underline mt-2">恢复默认快捷键</button>
                </div>

                <hr class="border-slate-100">

                <!-- 词库管理 -->
                <div class="space-y-4">
                    <button onclick="resetToDefault()" class="w-full border border-slate-300 hover:bg-slate-50 text-slate-700 py-3 rounded-lg font-medium flex items-center justify-center gap-2">
                        恢复默认538词库 (含全量反向考察)
                    </button>
                    <div class="border-t border-slate-100 pt-4">
                        <h3 class="font-semibold mb-2 text-sm">手动导入补充词汇</h3>
                        <textarea id="import-area" class="w-full h-32 p-3 border border-slate-300 rounded-lg text-sm mb-2" placeholder="单词 释义 (每行一个)"></textarea>
                        <button onclick="importWords()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-medium">导入</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 统计详情弹窗 -->
    <div id="stats-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-end md:items-center justify-center md:p-6 backdrop-blur-sm">
        <div class="w-full max-w-2xl bg-white rounded-t-2xl md:rounded-2xl shadow-2xl h-[90vh] md:h-[80vh] flex flex-col">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-white rounded-t-2xl">
                <div>
                    <h2 class="text-xl font-bold text-slate-800">学习统计</h2>
                    <p class="text-xs text-slate-500 mt-1">荧光条长度代表错误/模糊次数</p>
                </div>
                <button onclick="toggleStats(false)" class="p-2 hover:bg-slate-100 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="px-5 py-3 bg-slate-50 border-b border-slate-100 flex gap-2 overflow-x-auto no-scrollbar">
                <button onclick="renderStatsList('all')" class="stats-filter-btn px-3 py-1.5 rounded-full text-xs font-bold bg-indigo-600 text-white" data-filter="all">全部</button>
                <button onclick="renderStatsList('mastered')" class="stats-filter-btn px-3 py-1.5 rounded-full text-xs font-bold bg-slate-200 text-slate-600" data-filter="mastered">已斩</button>
                <button onclick="renderStatsList('learning')" class="stats-filter-btn px-3 py-1.5 rounded-full text-xs font-bold bg-slate-200 text-slate-600" data-filter="learning">错题本</button>
                <button onclick="renderStatsList('unseen')" class="stats-filter-btn px-3 py-1.5 rounded-full text-xs font-bold bg-slate-200 text-slate-600" data-filter="unseen">未见</button>
            </div>
            <div class="grid grid-cols-3 gap-2 px-5 py-3 text-center border-b border-slate-100 text-xs">
                <div class="bg-blue-50 p-2 rounded-lg">
                    <div class="text-blue-500 font-bold mb-0.5">总词数</div>
                    <div id="stat-total" class="text-lg font-black text-slate-700">0</div>
                </div>
                <div class="bg-green-50 p-2 rounded-lg">
                    <div class="text-green-600 font-bold mb-0.5">已斩</div>
                    <div id="stat-mastered" class="text-lg font-black text-slate-700">0</div>
                </div>
                <div class="bg-red-50 p-2 rounded-lg">
                    <div class="text-red-500 font-bold mb-0.5">累计错误</div>
                    <div id="stat-errors" class="text-lg font-black text-slate-700">0</div>
                </div>
            </div>
            <div id="stats-list" class="flex-1 overflow-y-auto p-0 md:p-2 bg-slate-50 space-y-[1px]"></div>
        </div>
    </div>

    <!-- JavaScript 逻辑 -->
    <script>

        const DEFAULT_DATA = [
            // 第一类

        // --- 全局状态 ---
        let vocabList = [];
        let masteredIds = [];
        let currentWord = null;
        let showMeaning = false;
        let selectedCategory = 'all';
        let reviewQueue = []; 
        let turnCounter = 0;
        let isReviewing = false; // 是否处于复习模式 (即点击了不记得/模糊后)

        // 默认快捷键
        let shortcuts = {
            show: ' ',
            forgot: 'q',
            fuzzy: 'w',
            master: 'e'
        };

        // --- 数据扩展函数 ---
        function expandVocabList(data) {
            let expanded = [];
            data.forEach(item => {
                expanded.push(item);
                if (item.s && item.s.trim()) {
                    const synonyms = item.s.split(/,|，/).map(s => s.trim()).filter(s => s);
                    if (synonyms.length > 0) {
                        synonyms.forEach(syn => {
                            const otherSynonyms = [item.w, ...synonyms.filter(x => x !== syn)];
                            const synLower = syn.toLowerCase();
                            let meaning = SYNONYM_DB[synLower];
                            if (!meaning) meaning = `同义词: ${item.m}`;
                            expanded.push({
                                c: item.c,
                                w: syn,
                                m: meaning, 
                                s: otherSynonyms.join(', '),
                                err: 0
                            });
                        });
                    }
                }
            });
            return expanded;
        }

        // --- 初始化 ---
        function init() {
            const savedVocab = localStorage.getItem('ielts538_vocab_v6');
            const savedMastered = localStorage.getItem('ielts538_mastered_v6');
            const savedShortcuts = localStorage.getItem('ielts538_shortcuts_v1');
            
            if (savedVocab) {
                vocabList = JSON.parse(savedVocab);
            } else {
                const baseData = JSON.parse(JSON.stringify(DEFAULT_DATA)).map(w => ({...w, err: 0}));
                vocabList = expandVocabList(baseData);
            }
            masteredIds = savedMastered ? JSON.parse(savedMastered) : [];
            
            if (savedShortcuts) {
                shortcuts = JSON.parse(savedShortcuts);
            }

            renderCategoryButtons();
            updateShortcutInputs();
            nextWord(true);

            // 绑定键盘事件
            document.addEventListener('keydown', handleKeydown);
        }

        function saveData() {
            localStorage.setItem('ielts538_vocab_v6', JSON.stringify(vocabList));
            localStorage.setItem('ielts538_mastered_v6', JSON.stringify(masteredIds));
        }

        function saveShortcuts() {
            localStorage.setItem('ielts538_shortcuts_v1', JSON.stringify(shortcuts));
        }

        // --- 核心逻辑 ---

        function getFilteredList() {
            if (selectedCategory === 'all') return vocabList;
            return vocabList.filter(item => item.c === selectedCategory);
        }

        function getUnmasteredList() {
            const filtered = getFilteredList();
            return filtered.filter(item => !masteredIds.includes(item.w));
        }

        function nextWord(isInit = false) {
            turnCounter++;
            isReviewing = false; // 重置复习状态
            
            const dueItems = reviewQueue.filter(item => item.due <= turnCounter);
            let selectedCandidate = null;

            if (dueItems.length > 0) {
                dueItems.sort((a, b) => a.due - b.due);
                const candidate = dueItems[0];
                reviewQueue = reviewQueue.filter(item => item !== candidate);
                const foundInCurrent = getUnmasteredList().find(w => w.w === candidate.w);
                if (foundInCurrent) selectedCandidate = foundInCurrent;
                else {
                    candidate.due = turnCounter + 1; 
                    reviewQueue.push(candidate);
                }
            }

            if (!selectedCandidate) {
                const unmastered = getUnmasteredList();
                const pendingWords = reviewQueue.map(q => q.w);
                const availablePool = unmastered.filter(w => !pendingWords.includes(w.w));
                if (availablePool.length > 0) {
                    selectedCandidate = availablePool[Math.floor(Math.random() * availablePool.length)];
                } else if (unmastered.length > 0) {
                    reviewQueue.sort((a,b) => a.due - b.due);
                    const forced = reviewQueue.shift(); 
                    selectedCandidate = unmastered.find(w => w.w === forced.w);
                }
            }

            if (selectedCandidate) {
                currentWord = selectedCandidate;
                showMeaning = false;
                updateUI(isInit);
            } else {
                currentWord = null;
                updateUI(isInit);
            }
        }

        function handleNext() {
            nextWord();
        }

        function handleMaster() {
            if (currentWord && !isReviewing) {
                masteredIds.push(currentWord.w);
                saveData();
                // 修改：不再直接nextWord()，而是进入复习模式显示释义和"下一个"按钮
                enterReviewMode();
            }
        }

        function handleForgot() {
            if (currentWord && !isReviewing) {
                incrementError(currentWord);
                saveData();
                enterReviewMode();
            }
        }

        function handleFuzzy() {
            if (currentWord && !isReviewing) {
                incrementError(currentWord);
                reviewQueue.push({ w: currentWord.w, due: turnCounter + 15 });
                saveData(); 
                enterReviewMode();
            }
        }

        function enterReviewMode() {
            isReviewing = true;
            showMeaning = true;
            updateUI();
        }

        function incrementError(wordObj) {
            wordObj.err = (wordObj.err || 0) + 1;
            const idx = vocabList.findIndex(w => w.w === wordObj.w);
            if (idx !== -1) vocabList[idx].err = wordObj.err;
        }

        function toggleMeaning() {
            if (!currentWord) return;
            if (isReviewing) {
                // 如果在复习模式，点击卡片通常可以被认为是想进入下一个，或者保持不变
                // 为了保持交互简单，这里不作特殊处理，只响应按钮
                return; 
            }
            showMeaning = !showMeaning;
            updateMeaningUI();
        }

        function switchCategory(cat) {
            selectedCategory = cat;
            renderCategoryButtons();
            nextWord();
        }

        function resetProgress() {
            if (confirm("确定要重置当前进度的记忆吗？已斩单词将重新出现。")) {
                masteredIds = [];
                reviewQueue = [];
                saveData();
                nextWord();
            }
        }

        // --- 键盘事件处理 ---
        function handleKeydown(e) {
            // 如果正在输入设置，不触发快捷键
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;

            const key = e.key.toLowerCase();
            const code = e.code; // 用于 Space 等

            // 映射 key
            let pressedKey = key;
            if (code === 'Space') pressedKey = ' ';

            // 匹配快捷键
            if (pressedKey === shortcuts.show.toLowerCase()) {
                e.preventDefault(); // 防止空格滚动页面
                if (isReviewing) handleNext();
                else toggleMeaning();
            } else if (pressedKey === shortcuts.forgot.toLowerCase()) {
                handleForgot();
            } else if (pressedKey === shortcuts.fuzzy.toLowerCase()) {
                handleFuzzy();
            } else if (pressedKey === shortcuts.master.toLowerCase()) {
                handleMaster();
            }
        }

        // --- 设置相关 ---
        let listeningInput = null;
        let listeningAction = null;

        function startListeningKey(input, action) {
            if (listeningInput) listeningInput.classList.remove('bg-yellow-100');
            listeningInput = input;
            listeningAction = action;
            input.value = "按下任意键...";
            input.classList.add('bg-yellow-100');
            
            // 临时添加一次性监听器
            document.addEventListener('keydown', captureKey, { once: true });
        }

        function captureKey(e) {
            e.preventDefault();
            if (!listeningInput) return;

            let keyName = e.key;
            if (e.code === 'Space') keyName = ' ';
            
            // 更新数据
            shortcuts[listeningAction] = keyName;
            saveShortcuts();

            // 更新 UI
            listeningInput.value = keyName === ' ' ? 'Space' : keyName;
            listeningInput.classList.remove('bg-yellow-100');
            listeningInput.blur();
            
            // 刷新主界面的提示键位
            updateKeyHints();

            listeningInput = null;
            listeningAction = null;
        }

        function updateShortcutInputs() {
            document.getElementById('input-key-show').value = shortcuts.show === ' ' ? 'Space' : shortcuts.show;
            document.getElementById('input-key-forgot').value = shortcuts.forgot;
            document.getElementById('input-key-fuzzy').value = shortcuts.fuzzy;
            document.getElementById('input-key-master').value = shortcuts.master;
            updateKeyHints();
        }

        function updateKeyHints() {
            const formatKey = (k) => k === ' ' ? 'Space' : k.toUpperCase();
            document.getElementById('hint-key').textContent = formatKey(shortcuts.show);
            document.getElementById('key-forgot').textContent = formatKey(shortcuts.forgot);
            document.getElementById('key-fuzzy').textContent = formatKey(shortcuts.fuzzy);
            document.getElementById('key-master').textContent = formatKey(shortcuts.master);
        }

        function resetShortcuts() {
            shortcuts = { show: ' ', forgot: 'q', fuzzy: 'w', master: 'e' };
            saveShortcuts();
            updateShortcutInputs();
        }

        // --- UI 更新 ---

        function renderCategoryButtons() {
            const container = document.getElementById('category-container');
            const categories = [{ id: 'all', label: '全部' }, { id: 'class1', label: '一类' }, { id: 'class2', label: '二类' }, { id: 'class3', label: '三类' }];
            container.innerHTML = categories.map(cat => {
                const isActive = selectedCategory === cat.id;
                const activeClass = "bg-indigo-600 text-white shadow-md";
                const inactiveClass = "bg-slate-100 text-slate-500 hover:bg-slate-200";
                return `<button onclick="switchCategory('${cat.id}')" class="whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-bold transition-all ${isActive ? activeClass : inactiveClass}">${cat.label}</button>`;
            }).join('');
        }

        function updateUI(isInit) {
            const cardView = document.getElementById('card-view');
            const doneView = document.getElementById('done-view');
            const filtered = getFilteredList();
            const unmastered = getUnmasteredList();
            const progress = filtered.length > 0 ? Math.round(((filtered.length - unmastered.length) / filtered.length) * 100) : 0;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = `进度 ${progress}% (${filtered.length - unmastered.length}/${filtered.length})`;
            const labelMap = { 'all': '全部乱序', 'class1': '第一类考点词', 'class2': '第二类考点词', 'class3': '第三类考点词' };
            document.getElementById('current-category-label').textContent = labelMap[selectedCategory];

            if (unmastered.length === 0 && !currentWord) {
                cardView.style.display = 'none';
                doneView.style.display = 'flex';
                document.getElementById('done-category-name').textContent = labelMap[selectedCategory];
            } else {
                cardView.style.display = 'flex';
                doneView.style.display = 'none';
                if (currentWord) {
                    document.getElementById('word-text').textContent = currentWord.w;
                    document.getElementById('meaning-text').textContent = currentWord.m;
                    const badge = document.getElementById('word-badge');
                    badge.textContent = currentWord.c === 'class1' ? 'Class 1' : currentWord.c === 'class2' ? 'Class 2' : 'Class 3';
                    let colorClass = "";
                    if (currentWord.c === 'class1') colorClass = "text-red-600 bg-red-50 border-red-200";
                    else if (currentWord.c === 'class2') colorClass = "text-orange-600 bg-orange-50 border-orange-200";
                    else colorClass = "text-blue-600 bg-blue-50 border-blue-200";
                    badge.className = `absolute top-4 right-4 px-3 py-1 rounded-full text-xs font-bold border ${colorClass}`;
                    const errBadge = document.getElementById('error-badge');
                    const errCountDisp = document.getElementById('error-count-display');
                    if (currentWord.err > 0) {
                        errBadge.classList.remove('hidden');
                        errCountDisp.textContent = currentWord.err;
                    } else {
                        errBadge.classList.add('hidden');
                    }
                    const synonymBox = document.getElementById('synonym-box');
                    const synonymText = document.getElementById('synonym-text');
                    if (currentWord.s) {
                        synonymText.textContent = currentWord.s;
                        synonymBox.classList.remove('hidden');
                    } else {
                        synonymBox.classList.add('hidden');
                    }
                }
                
                // 切换底部按钮区
                const standardControls = document.getElementById('controls-standard');
                const reviewControls = document.getElementById('controls-review');
                
                // 确保在 updateUI 时刷新释义的可见性
                updateMeaningUI();

                if (isReviewing) {
                    standardControls.classList.add('hidden');
                    reviewControls.classList.remove('hidden');
                    // 在复习模式，释义总是显示的，所以底部的提示可以隐藏或改为"下一个"
                    document.getElementById('hint-text').classList.add('opacity-0'); 
                } else {
                    standardControls.classList.remove('hidden');
                    reviewControls.classList.add('hidden');
                }
            }
        }

        function updateMeaningUI() {
            const container = document.getElementById('meaning-container');
            const hint = document.getElementById('hint-text');
            if (showMeaning) {
                container.classList.remove('opacity-0', 'translate-y-8');
                container.style.pointerEvents = 'auto';
                hint.classList.add('opacity-0');
            } else {
                container.classList.add('opacity-0', 'translate-y-8');
                container.style.pointerEvents = 'none';
                hint.classList.remove('opacity-0');
            }
        }

        function toggleStats(show) {
            const modal = document.getElementById('stats-modal');
            if (show) { modal.classList.remove('hidden'); renderStatsList('all'); } else { modal.classList.add('hidden'); }
        }

        function renderStatsList(filterType) {
            document.querySelectorAll('.stats-filter-btn').forEach(btn => {
                if (btn.dataset.filter === filterType) {
                    btn.classList.remove('bg-slate-200', 'text-slate-600');
                    btn.classList.add('bg-indigo-600', 'text-white');
                } else {
                    btn.classList.add('bg-slate-200', 'text-slate-600');
                    btn.classList.remove('bg-indigo-600', 'text-white');
                }
            });
            const baseList = getFilteredList(); 
            const masteredSet = new Set(masteredIds);
            let displayList = [...baseList];
            const total = baseList.length;
            const masteredCount = baseList.filter(w => masteredSet.has(w.w)).length;
            const totalErrors = baseList.reduce((sum, w) => sum + (w.err || 0), 0);
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-mastered').textContent = masteredCount;
            document.getElementById('stat-errors').textContent = totalErrors;
            if (filterType === 'mastered') displayList = displayList.filter(w => masteredSet.has(w.w));
            else if (filterType === 'unseen') displayList = displayList.filter(w => !masteredSet.has(w.w) && (!w.err || w.err === 0));
            else if (filterType === 'learning') {
                displayList = displayList.filter(w => !masteredSet.has(w.w) && (w.err > 0));
                displayList.sort((a, b) => b.err - a.err);
            }
            const listEl = document.getElementById('stats-list');
            if (displayList.length === 0) {
                listEl.innerHTML = '<div class="p-8 text-center text-slate-400 text-sm">暂无数据</div>';
                return;
            }
            listEl.innerHTML = displayList.map(w => {
                const isMastered = masteredSet.has(w.w);
                const err = w.err || 0;
                const barWidth = Math.min(err * 10, 100); 
                let icon = '';
                if (isMastered) icon = '<span class="text-green-500 font-bold text-xs border border-green-200 bg-green-50 px-1.5 rounded">已斩</span>';
                else if (err > 0) icon = `<span class="text-amber-600 font-bold text-xs border border-amber-200 bg-amber-50 px-1.5 rounded">错 ${err}</span>`;
                else icon = '<span class="text-slate-400 font-bold text-xs border border-slate-200 bg-slate-50 px-1.5 rounded">未见</span>';
                return `
                    <div class="relative bg-white p-3 flex justify-between items-center overflow-hidden group">
                        <div class="absolute left-0 top-0 bottom-0 bg-pink-100 opacity-50 error-bar" style="width: ${barWidth}%; z-index: 0;"></div>
                        <div class="relative z-10 flex flex-col items-start gap-1">
                            <div class="font-bold text-slate-800 text-sm md:text-base">${w.w}</div>
                            <div class="text-xs text-slate-500 truncate max-w-[200px]">${w.m}</div>
                        </div>
                        <div class="relative z-10 flex items-center gap-2">
                            ${icon}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleSettings(show) {
            const modal = document.getElementById('settings-modal');
            if (show) modal.classList.remove('hidden'); else modal.classList.add('hidden');
        }

        function resetToDefault() {
            if(confirm("恢复默认会清除所有进度和错误记录。确定吗？")) {
                const baseData = JSON.parse(JSON.stringify(DEFAULT_DATA)).map(w => ({...w, err: 0}));
                vocabList = expandVocabList(baseData);
                masteredIds = [];
                reviewQueue = [];
                saveData();
                toggleSettings(false);
                nextWord();
                alert("已重置 (含精准反向考察)");
            }
        }

        function importWords() {
            const text = document.getElementById('import-area').value;
            const lines = text.split('\n').filter(l => l.trim().length > 0);
            const parsed = lines.map(line => {
                const parts = line.split(/[\t\s]+/);
                if (parts.length < 2) return null;
                return { c: 'class3', w: parts[0], m: line.substring(parts[0].length).trim(), s: '', err: 0 };
            }).filter(Boolean);
            if (parsed.length > 0) {
                if(confirm(`解析出 ${parsed.length} 个单词。确定追加？`)) {
                    vocabList = [...vocabList, ...parsed];
                    saveData();
                    document.getElementById('import-area').value = "";
                    toggleSettings(false);
                    nextWord();
                }
            } else {
                alert("格式无法识别。");
            }
        }

        init();
    </script>
</body>
</html>
